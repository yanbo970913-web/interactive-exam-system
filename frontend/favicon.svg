<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0A0F1E"/>
    </linearGradient>
    <linearGradient id="cap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="29" fill="none" stroke="#3B82F6" stroke-width="0.8" opacity="0.5"/>

  <!-- Star sparkles -->
  <g opacity="0.7">
    <polygon points="8,14 9,11 10,14 13,14 10.5,16 11.5,19 9,17 6.5,19 7.5,16 5,14" fill="#FBBF24" transform="scale(0.6) translate(5,5)"/>
    <polygon points="56,10 57,7 58,10 61,10 58.5,12 59.5,15 57,13 54.5,15 55.5,12 53,10" fill="#60A5FA" transform="scale(0.5) translate(2,2)"/>
    <circle cx="54" cy="14" r="1.5" fill="#FBBF24" opacity="0.8"/>
    <circle cx="10" cy="50" r="1" fill="#60A5FA" opacity="0.6"/>
    <circle cx="56" cy="46" r="1.2" fill="#FBBF24" opacity="0.5"/>
  </g>

  <!-- Diploma/scroll body -->
  <rect x="14" y="26" width="36" height="26" rx="3" fill="#1E3A5F" filter="url(#shadow)"/>
  <rect x="14" y="26" width="36" height="26" rx="3" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.6"/>

  <!-- Scroll curl left -->
  <ellipse cx="14" cy="39" rx="4" ry="13" fill="#243B5E" stroke="#3B82F6" stroke-width="0.8" opacity="0.8"/>
  <!-- Scroll curl right -->
  <ellipse cx="50" cy="39" rx="4" ry="13" fill="#243B5E" stroke="#3B82F6" stroke-width="0.8" opacity="0.8"/>

  <!-- Lines on diploma -->
  <line x1="20" y1="35" x2="44" y2="35" stroke="#60A5FA" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="20" y1="40" x2="44" y2="40" stroke="#60A5FA" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <line x1="20" y1="44" x2="38" y2="44" stroke="#60A5FA" stroke-width="1" stroke-linecap="round" opacity="0.3"/>

  <!-- Ribbon/seal -->
  <circle cx="32" cy="49" r="5" fill="#1E3A5F" stroke="#FBBF24" stroke-width="1.2"/>
  <text x="32" y="52" text-anchor="middle" font-size="5" fill="#FBBF24" font-family="Arial" font-weight="bold">✓</text>

  <!-- Graduation cap -->
  <g filter="url(#shadow)">
    <!-- Cap brim -->
    <ellipse cx="32" cy="22" rx="16" ry="5" fill="url(#cap)"/>
    <!-- Cap top -->
    <rect x="25" y="13" width="14" height="9" rx="1" fill="#D97706"/>
    <rect x="25" y="13" width="14" height="9" rx="1" fill="url(#cap)" opacity="0.8"/>
    <!-- Cap highlight -->
    <ellipse cx="32" cy="22" rx="16" ry="5" fill="none" stroke="#FCD34D" stroke-width="0.6" opacity="0.5"/>
    <!-- Tassel string -->
    <line x1="46" y1="22" x2="50" y2="30" stroke="#D97706" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="50" cy="31" r="2.5" fill="#FBBF24"/>
    <!-- Tassel fringe -->
    <line x1="49" y1="33" x2="48" y2="37" stroke="#D97706" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="50" y1="33" x2="50" y2="37" stroke="#D97706" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="51" y1="33" x2="52" y2="37" stroke="#D97706" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- Glow ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#glow)" stroke-width="0.5" opacity="0.4"/>
</svg>
